<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VGC Arena — Plataforma de Equipos Competitivos de Pokémon VGC</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Encuentra, valora y publica equipos competitivos de Pokémon Champions (VGC). Sistema de votación de dos ejes, allowlists actualizadas y buscador avanzado.">
  <meta name="keywords" content="pokemon, vgc, pokemon champions, pokemon competitivo, equipos pokemon, team sheets, pokeapi">
  <meta name="author" content="VGC Arena Team">
  <meta property="og:title" content="VGC Arena — Equipos Competitivos de Pokémon">
  <meta property="og:description" content="Plataforma de eSports Pokémon para crear, valorar y compartir equipos.">
  <meta property="og:type" content="website">

  <!-- Google Fonts: Outfit (Display) & Inter (Body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <!-- CSS Design System -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/globals.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

  <!-- Elemento para Skip Links (Accesibilidad) -->
  <a href="#app" class="skip-link" style="position: absolute; top: -100px; left: 0; background: var(--accent-primary); color: #fff; padding: var(--space-2); z-index: 1000; transition: top 0.2s;">Saltar al contenido principal</a>

  <!-- Header / Navbar Root -->
  <div id="navbar-root"></div>

  <!-- SPA Content Root -->
  <main id="app" class="container" aria-live="polite"></main>

  <!-- Footer -->
  <footer style="margin-top: var(--space-8); padding: var(--space-6) 0; border-top: 1px solid var(--border-subtle); font-size: 0.85rem; color: var(--text-tertiary);">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-4);">
      <div>
        <p>© 2026 VGC Arena. Plataforma creada por fans para fans.</p>
        <p style="margin-top: var(--space-1); font-size: 0.75rem;">
          Este sitio no está afiliado ni respaldado por Nintendo, Game Freak o The Pokémon Company. 
          Los sprites y datos provienen de <a href="https://pokeapi.co" target="_blank" rel="noopener noreferrer">PokéAPI</a>.
        </p>
      </div>
      <div style="display: flex; gap: var(--space-4);">
        <a href="/about" data-link>Sobre el Proyecto</a>
        <a href="https://github.com/PokeAPI" target="_blank" rel="noopener noreferrer">PokéAPI GitHub</a>
      </div>
    </div>
  </footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- SPA Router & Logic (Module) -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
