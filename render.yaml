services:
  - type: web
    name: vgcarena
    env: node
    rootDir: VGCArena
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_FILE
        value: /var/data/db.json
    disk:
      name: vgcarena-data
      mountPath: /var/data
      sizeGB: 1
